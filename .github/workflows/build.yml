name: Build Kino APK
on:
  push:
    branches: [ master, main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Check wrapper files
        run: |
          ls -la gradlew || echo "ERROR gradlew missing"
          ls -la gradle/wrapper/gradle-wrapper.jar || echo "ERROR jar missing"

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log

      - name: Find APK files
        if: always()
        run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Kino-APK
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            **/build/outputs/apk/**/*.apk

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
